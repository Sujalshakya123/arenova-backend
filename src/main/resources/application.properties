spring.application.name=arenova-backend

spring.datasource.url=jdbc:mysql://localhost:3306/database
spring.datasource.username=${undb}
spring.datasource.password=${pwdb}

#JPA CONFIGURATION

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.security.oauth2.client.registration.google.client-id=${clientid}
spring.security.oauth2.client.registration.google.client-secret=${clientpw}
spring.security.oauth2.client.registration.google.scope=profile,email


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${myuser}
spring.mail.password=${mypw}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

